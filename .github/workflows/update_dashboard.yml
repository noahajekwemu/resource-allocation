name: Update Dashboard

on:
schedule:
- cron: '0 * * * *'
workflow_dispatch:

permissions:
contents: write

jobs:
update-dashboard:
runs-on: ubuntu-latest


steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: '3.12'

  - name: Install dependencies
    run: |
      pip install -r requirements.txt

  - name: Create credentials folder
    run: mkdir -p credentials

  - name: Rebuild service account credentials
    run: |
      echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials/service_account.json

  - name: Generate dashboard data
    run: |
      python -m scripts.calculate_metrics

  - name: Commit updated dashboard data
    run: |
      git config --global user.name "github-actions"
      git config --global user.email "github-actions@github.com"

      git add dashboard/data.json

      git diff --staged --quiet || git commit -m "Automated dashboard update"

      git push