<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Issue Stock</title>
  <style>
    :root {
      --border: #d7dde8;
      --ink: #1f2937;
      --muted: #667085;
      --surface: #f7f9fc;
      --primary: #1d4ed8;
      --primary-hover: #1e40af;
      --danger: #b42318;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--surface);
      color: var(--ink);
      font-family: Arial, sans-serif;
      line-height: 1.5;
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 32px auto;
    }

    h1 {
      margin: 0 0 24px;
      font-size: clamp(1.6rem, 3vw, 2.25rem);
    }

    form {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 700;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--ink);
      font: inherit;
      padding: 10px 12px;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
    }

    .details {
      margin-top: 24px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 720px;
    }

    th,
    td {
      border-bottom: 1px solid var(--border);
      padding: 10px;
      text-align: left;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-size: 0.82rem;
      text-transform: uppercase;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: space-between;
      margin-top: 20px;
    }

    button {
      border: 0;
      border-radius: 6px;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      min-height: 42px;
      padding: 10px 16px;
    }

    .primary {
      background: var(--primary);
      color: #fff;
    }

    .primary:hover {
      background: var(--primary-hover);
    }

    .secondary {
      background: #e7edf6;
      color: var(--ink);
    }

    .remove {
      background: #fee4e2;
      color: var(--danger);
    }

    #status {
      color: var(--muted);
      margin-top: 16px;
    }

    @media (max-width: 760px) {
      main {
        width: min(100% - 20px, 1120px);
        margin: 20px auto;
      }

      form {
        padding: 16px;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Issue Stock</h1>
    <form id="issue-stock-form">
      <div class="grid">
        <label>
          Transaction date
          <input type="date" name="Transaction_Date" required>
        </label>
        <label>
          Warehouse
          <select name="Warehouse_ID" id="warehouse-select" required>
            <option value="">Select warehouse</option>
          </select>
        </label>
        <label>
          Destination school
          <select name="Destination_School_ID" id="school-select" required>
            <option value="">Select school</option>
          </select>
        </label>
        <label>
          Status
          <select name="Status">
            <option value="Completed">Completed</option>
            <option value="Pending">Pending</option>
          </select>
        </label>
        <label>
          Requisition
          <select name="Requisition_ID" id="requisition-select">
            <option value="">Select open requisition</option>
          </select>
        </label>
      </div>

      <label style="margin-top: 16px;">
        Remarks
        <textarea name="Remarks" placeholder="Optional notes"></textarea>
      </label>

      <section class="details" aria-label="Open requisitions">
        <table>
          <thead>
            <tr>
              <th>Requisition</th>
              <th>School</th>
              <th>Status</th>
              <th>Item</th>
              <th>Approved</th>
              <th>Fulfilled</th>
              <th>Remaining</th>
            </tr>
          </thead>
          <tbody id="open-requisition-rows">
            <tr>
              <td colspan="7">Loading open requisitions...</td>
            </tr>
          </tbody>
        </table>
      </section>

      <section class="details" aria-label="Issued items">
        <table>
          <thead>
            <tr>
              <th>Item</th>
              <th>Quantity</th>
              <th>Condition</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="item-rows"></tbody>
        </table>
      </section>

      <div class="actions">
        <button type="button" class="secondary" id="add-row">Add item row</button>
        <button type="submit" class="primary">Submit issued stock</button>
      </div>
      <p id="status" role="status"></p>
    </form>
  </main>

  <template id="item-row-template">
    <tr>
      <td>
        <select class="item-select" name="Item_ID" required>
          <option value="">Select item</option>
        </select>
      </td>
      <td>
        <input type="number" name="Quantity" min="1" step="1" required>
      </td>
      <td>
        <select name="Condition">
          <option value="Good">Good</option>
          <option value="Damaged">Damaged</option>
          <option value="Expired">Expired</option>
        </select>
      </td>
      <td>
        <button type="button" class="remove">Remove</button>
      </td>
    </tr>
  </template>

  <script>
    const form = document.querySelector("#issue-stock-form");
    const rows = document.querySelector("#item-rows");
    const template = document.querySelector("#item-row-template");
    const statusText = document.querySelector("#status");
    const requisitionSelect = document.querySelector("#requisition-select");
    const openRequisitionRows = document.querySelector("#open-requisition-rows");
    const API_BASE = "http://127.0.0.1:5000";
    let items = [];
    let openRequisitions = [];

    async function loadJson(url) {
      const response = await fetch(url);
      let result = null;
      try {
        result = await response.json();
      } catch (error) {
        throw new Error("The API returned an unreadable response.");
      }
      if (!response.ok) {
        throw new Error(result.error || `Request failed with status ${response.status}.`);
      }
      return result;
    }

    async function loadList(url, listKey) {
      const result = await loadJson(url);
      if (Array.isArray(result)) return result;
      if (Array.isArray(result[listKey])) return result[listKey];
      throw new Error("The API did not return a list.");
    }

    function value(record, keys) {
      return keys.map((key) => record?.[key]).find((entry) => entry !== undefined && entry !== null && entry !== "") || "";
    }

    function optionLabel(record, idKey, nameKeys) {
      const name = nameKeys.map((key) => record[key]).find(Boolean);
      return name ? `${record[idKey]} - ${name}` : record[idKey];
    }

    function fillSelect(select, records, idKey, nameKeys) {
      select.options.length = 1;
      records.forEach((record) => {
        if (!record[idKey]) return;
        const option = document.createElement("option");
        option.value = record[idKey];
        option.textContent = optionLabel(record, idKey, nameKeys);
        select.appendChild(option);
      });
    }

    function itemLabel(itemId) {
      const item = items.find((record) => record.Item_ID === itemId);
      return item ? optionLabel(item, "Item_ID", ["Item_Name", "Item"]) : itemId;
    }

    function fillRequisitionSelect() {
      requisitionSelect.options.length = 1;
      openRequisitions.forEach((requisition) => {
        const id = value(requisition, ["Requisition_ID", "Requisition ID"]);
        const schoolName = value(requisition, ["School_Name", "School Name"]);
        const schoolId = value(requisition, ["School_ID", "School ID"]);
        const status = value(requisition, ["Status"]);
        if (!id) return;
        const option = document.createElement("option");
        option.value = id;
        option.textContent = `${id} - ${schoolName || schoolId} (${status})`;
        requisitionSelect.appendChild(option);
      });
    }

    function renderOpenRequisitions() {
      openRequisitionRows.innerHTML = "";
      if (!openRequisitions.length) {
        const row = document.createElement("tr");
        row.innerHTML = '<td colspan="7">No open requisitions.</td>';
        openRequisitionRows.appendChild(row);
        return;
      }

      openRequisitions.forEach((requisition) => {
        const id = value(requisition, ["Requisition_ID", "Requisition ID"]);
        const school = value(requisition, ["School_Name", "School Name"]) || value(requisition, ["School_ID", "School ID"]);
        const status = value(requisition, ["Status"]);
        (requisition.details || []).forEach((detail) => {
          const row = document.createElement("tr");
          [
            id,
            school,
            status,
            itemLabel(value(detail, ["Item_ID", "Item ID"])),
            value(detail, ["Quantity_Approved", "Approved Quantity"]),
            value(detail, ["Quantity_Fulfilled", "Fulfilled Quantity"]) || "0",
            value(detail, ["Quantity_Remaining", "Remaining Quantity"])
          ].forEach((text) => {
            const cell = document.createElement("td");
            cell.textContent = text;
            row.appendChild(cell);
          });
          openRequisitionRows.appendChild(row);
        });
      });
    }

    function addRow() {
      const row = template.content.firstElementChild.cloneNode(true);
      fillSelect(row.querySelector(".item-select"), items, "Item_ID", ["Item_Name", "Item"]);
      row.querySelector(".remove").addEventListener("click", () => {
        if (rows.children.length > 1) row.remove();
      });
      rows.appendChild(row);
    }

    function addRequisitionDetailRow(detail) {
      const row = template.content.firstElementChild.cloneNode(true);
      const itemSelect = row.querySelector(".item-select");
      fillSelect(itemSelect, items, "Item_ID", ["Item_Name", "Item"]);
      itemSelect.value = value(detail, ["Item_ID", "Item ID"]);
      row.querySelector("[name='Quantity']").value = value(detail, ["Quantity_Remaining", "Remaining Quantity"]);
      row.querySelector(".remove").addEventListener("click", () => {
        if (rows.children.length > 1) row.remove();
      });
      rows.appendChild(row);
    }

    function applySelectedRequisition() {
      const requisition = openRequisitions.find((record) => value(record, ["Requisition_ID", "Requisition ID"]) === requisitionSelect.value);
      if (!requisition) return;

      const schoolId = value(requisition, ["School_ID", "School ID"]);
      const schoolSelect = document.querySelector("#school-select");
      if (schoolId) schoolSelect.value = schoolId;

      rows.innerHTML = "";
      (requisition.details || []).forEach(addRequisitionDetailRow);
      if (!rows.children.length) addRow();
    }

    function collectPayload() {
      const formData = new FormData(form);
      return {
        Transaction_Date: formData.get("Transaction_Date"),
        Warehouse_ID: formData.get("Warehouse_ID"),
        Destination_School_ID: formData.get("Destination_School_ID"),
        Requisition_ID: formData.get("Requisition_ID"),
        Status: formData.get("Status"),
        Remarks: formData.get("Remarks"),
        items: Array.from(rows.querySelectorAll("tr")).map((row) => ({
          Item_ID: row.querySelector("[name='Item_ID']").value,
          Quantity: Number(row.querySelector("[name='Quantity']").value),
          Condition: row.querySelector("[name='Condition']").value
        }))
      };
    }

    async function init() {
      try {
        const [loadedItems, warehouses, schools, requisitions] = await Promise.all([
          loadList(`${API_BASE}/items`, "items"),
          loadList(`${API_BASE}/warehouses`, "warehouses"),
          loadList(`${API_BASE}/schools`, "schools"),
          loadList(`${API_BASE}/open_requisitions`, "requisitions")
        ]);
        items = loadedItems;
        openRequisitions = requisitions;
        fillSelect(document.querySelector("#warehouse-select"), warehouses, "Warehouse_ID", ["Warehouse_Name", "Warehouse"]);
        fillSelect(document.querySelector("#school-select"), schools, "School_ID", ["School_Name", "School"]);
        fillRequisitionSelect();
        renderOpenRequisitions();
        statusText.textContent = "";
      } catch (error) {
        statusText.textContent = `Dropdown data could not be loaded. Start form_api.py and refresh this page. Details: ${error.message}`;
      }
      addRow();
    }

    document.querySelector("#add-row").addEventListener("click", addRow);
    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      statusText.textContent = "Validating and submitting...";
      try {
        const response = await fetch(`${API_BASE}/submit_issue_stock`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(collectPayload())
        });
        const result = await response.json();
        if (!response.ok || result.success === false) {
          throw new Error(result.error || "Issue stock was not submitted.");
        }
        form.reset();
        rows.innerHTML = "";
        addRow();
        openRequisitions = await loadList(`${API_BASE}/open_requisitions`, "requisitions");
        fillRequisitionSelect();
        renderOpenRequisitions();
        statusText.textContent = "Issued stock submitted successfully.";
      } catch (error) {
        statusText.textContent = `Submission failed: ${error.message}`;
      }
    });

    requisitionSelect.addEventListener("change", applySelectedRequisition);

    init();
  </script>
</body>
</html>
