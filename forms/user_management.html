<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>User Management</title>
  <style>
    :root { color-scheme: light; font-family: Arial, Helvetica, sans-serif; --blue: #0b6fb8; --light: #eaf6ff; --red: #b91c1c; --green: #166534; }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--light); color: #1f2937; }
    header { background: var(--blue); color: white; padding: 1.2rem max(1rem, calc((100% - 1200px) / 2)); }
    header h1 { margin: 0 0 .25rem; }
    header a { color: white; }
    main { margin: 0 auto; max-width: 1200px; padding: 1.5rem 1rem 3rem; }
    section, dialog { background: white; border: 1px solid #cbd5e1; border-radius: 8px; box-shadow: 0 6px 20px rgb(15 23 42 / 10%); padding: 1.25rem; }
    section + section { margin-top: 1.5rem; }
    h2 { color: var(--blue); margin-top: 0; }
    .form-grid { display: grid; gap: 1rem; grid-template-columns: repeat(3, minmax(0, 1fr)); }
    label { display: grid; font-weight: 700; gap: .35rem; }
    input, select, button { border: 1px solid #94a3b8; border-radius: 5px; font: inherit; padding: .65rem; }
    input[type="checkbox"] { height: 1.1rem; width: 1.1rem; }
    .checkbox { align-content: center; display: flex; gap: .5rem; }
    button { background: var(--blue); border-color: var(--blue); color: white; cursor: pointer; font-weight: 700; }
    button.secondary { background: white; color: var(--blue); }
    button.danger { background: var(--red); border-color: var(--red); }
    button.success { background: var(--green); border-color: var(--green); }
    .actions { display: flex; flex-wrap: wrap; gap: .45rem; }
    .actions button { font-size: .82rem; padding: .45rem .6rem; }
    .table-scroll { overflow-x: auto; }
    table { border-collapse: collapse; min-width: 900px; width: 100%; }
    th, td { border-bottom: 1px solid #dbeafe; padding: .7rem; text-align: left; }
    th { background: var(--blue); color: white; }
    .status { min-height: 1.5rem; }
    .status.error { color: var(--red); }
    .status.success { color: var(--green); }
    dialog { max-width: 680px; width: calc(100% - 2rem); }
    dialog::backdrop { background: rgb(15 23 42 / 55%); }
    @media (max-width: 760px) { .form-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <h1>User Management</h1>
    <a href="/forms/approve_requisition.html">Back to administration</a>
  </header>
  <main>
    <section aria-labelledby="create-heading">
      <h2 id="create-heading">Create User</h2>
      <form id="create-form">
        <div class="form-grid">
          <label>Full Name<input name="Full_Name" required autocomplete="name"></label>
          <label>Email<input name="Email" type="email" required autocomplete="email"></label>
          <label>Role<select name="Role" class="role" required></select></label>
          <label>School<select name="School_ID" class="school"><option value="">Not assigned</option></select></label>
          <label>Password<input name="Password" type="password" required autocomplete="new-password"></label>
          <label class="checkbox"><input name="Active" type="checkbox" checked> Active</label>
        </div>
        <p><button type="submit">Create User</button></p>
      </form>
      <p id="create-status" class="status" role="status"></p>
    </section>

    <section aria-labelledby="users-heading">
      <h2 id="users-heading">System Users</h2>
      <p id="table-status" class="status" role="status">Loading users...</p>
      <div class="table-scroll">
        <table>
          <thead><tr><th>User_ID</th><th>Full Name</th><th>Email</th><th>Role</th><th>School_ID</th><th>Active</th><th>Created_At</th><th>Actions</th></tr></thead>
          <tbody id="user-rows"></tbody>
        </table>
      </div>
    </section>
  </main>

  <dialog id="edit-dialog">
    <form id="edit-form">
      <h2>Edit User</h2>
      <input name="User_ID" type="hidden">
      <div class="form-grid">
        <label>Full Name<input name="Full_Name" required></label>
        <label>Role<select name="Role" class="role" required></select></label>
        <label>School<select name="School_ID" class="school"><option value="">Not assigned</option></select></label>
      </div>
      <p class="actions"><button type="submit">Save Changes</button><button type="button" class="secondary" id="cancel-edit">Cancel</button></p>
      <p id="edit-status" class="status" role="status"></p>
    </form>
  </dialog>

  <script>
    const ROLES = ["Admin", "Approver", "Store_Officer", "School_User", "Viewer"];
    let users = [];

    async function api(path, options = {}) {
      const response = await fetch(path, { cache: "no-store", ...options, headers: { "Content-Type": "application/json", ...(options.headers || {}) } });
      const result = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(result.error || `Request failed with status ${response.status}.`);
      return result;
    }

    function setStatus(element, message, type = "") {
      element.textContent = message;
      element.className = `status ${type}`.trim();
    }

    function populateRoles() {
      document.querySelectorAll("select.role").forEach((select) => {
        ROLES.forEach((role) => select.add(new Option(role, role)));
      });
    }

    async function loadSchools() {
      const schools = await api("/api/schools");
      document.querySelectorAll("select.school").forEach((select) => {
        schools.forEach((school) => {
          const id = school.School_ID || school.school_id || "";
          const name = school.School_Name || school.school_name || id;
          if (id) select.add(new Option(`${id} - ${name}`, id));
        });
      });
    }

    function actionButton(label, className, handler) {
      const button = document.createElement("button");
      button.type = "button";
      button.textContent = label;
      button.className = className;
      button.addEventListener("click", handler);
      return button;
    }

    function renderUsers() {
      const tbody = document.querySelector("#user-rows");
      tbody.replaceChildren();
      users.forEach((user) => {
        const row = document.createElement("tr");
        ["User_ID", "Full_Name", "Email", "Role", "School_ID", "Active", "Created_At"].forEach((field) => {
          const cell = document.createElement("td");
          cell.textContent = field === "Active" ? (user.Active ? "Yes" : "No") : (user[field] || "");
          row.appendChild(cell);
        });
        const actions = document.createElement("td");
        actions.className = "actions";
        actions.append(
          actionButton("Edit user", "secondary", () => openEdit(user)),
          actionButton(user.Active ? "Deactivate" : "Activate", user.Active ? "danger" : "success", () => toggleActive(user)),
          actionButton("Reset password", "secondary", () => resetPassword(user))
        );
        row.appendChild(actions);
        tbody.appendChild(row);
      });
      setStatus(document.querySelector("#table-status"), users.length ? `${users.length} user(s) loaded.` : "No users found.");
    }

    async function loadUsers() {
      const result = await api("/api/users");
      users = result.users;
      renderUsers();
    }

    function openEdit(user) {
      const form = document.querySelector("#edit-form");
      form.elements.User_ID.value = user.User_ID;
      form.elements.Full_Name.value = user.Full_Name;
      form.elements.Role.value = user.Role;
      form.elements.School_ID.value = user.School_ID || "";
      setStatus(document.querySelector("#edit-status"), "");
      document.querySelector("#edit-dialog").showModal();
    }

    async function toggleActive(user) {
      if (!window.confirm(`${user.Active ? "Deactivate" : "Activate"} ${user.Full_Name}?`)) return;
      await api(`/api/users/${encodeURIComponent(user.User_ID)}`, { method: "PATCH", body: JSON.stringify({ Active: !user.Active }) });
      await loadUsers();
    }

    async function resetPassword(user) {
      const password = window.prompt(`Enter a new password for ${user.Full_Name}:`);
      if (!password) return;
      await api(`/api/users/${encodeURIComponent(user.User_ID)}/reset-password`, { method: "POST", body: JSON.stringify({ Password: password }) });
      window.alert("Password reset successfully.");
    }

    document.querySelector("#create-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      const form = event.currentTarget;
      const status = document.querySelector("#create-status");
      const data = Object.fromEntries(new FormData(form));
      data.Active = form.elements.Active.checked;
      try {
        setStatus(status, "Creating user...");
        await api("/api/users", { method: "POST", body: JSON.stringify(data) });
        form.reset();
        form.elements.Active.checked = true;
        setStatus(status, "User created successfully.", "success");
        await loadUsers();
      } catch (error) { setStatus(status, error.message, "error"); }
    });

    document.querySelector("#edit-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      const form = event.currentTarget;
      const status = document.querySelector("#edit-status");
      const payload = { Full_Name: form.elements.Full_Name.value, Role: form.elements.Role.value, School_ID: form.elements.School_ID.value };
      try {
        await api(`/api/users/${encodeURIComponent(form.elements.User_ID.value)}`, { method: "PATCH", body: JSON.stringify(payload) });
        document.querySelector("#edit-dialog").close();
        await loadUsers();
      } catch (error) { setStatus(status, error.message, "error"); }
    });

    document.querySelector("#cancel-edit").addEventListener("click", () => document.querySelector("#edit-dialog").close());
    populateRoles();
    Promise.all([loadSchools(), loadUsers()]).catch((error) => setStatus(document.querySelector("#table-status"), error.message, "error"));
  </script>
</body>
</html>
