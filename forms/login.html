<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Resource Allocation Login</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f7fb; margin: 0; color: #172033; }
    main { max-width: 420px; margin: 10vh auto; padding: 2rem; background: white; border-radius: 10px; box-shadow: 0 8px 30px #1b31551a; }
    label { display: block; margin: 1rem 0 .35rem; font-weight: 600; }
    input, button { box-sizing: border-box; width: 100%; padding: .75rem; font: inherit; }
    input { border: 1px solid #aeb8c8; border-radius: 5px; }
    button { margin-top: 1.25rem; border: 0; border-radius: 5px; color: white; background: #1e5aa8; cursor: pointer; }
    .error { color: #a01818; background: #fff0f0; padding: .75rem; border-radius: 5px; }
  </style>
</head>
<body>
  <main>
    <h1>Sign in</h1>
    {% if error %}<p class="error" role="alert">{{ error }}</p>{% endif %}
    <form method="post" action="{{ url_for('login_route') }}">
      <input name="next" type="hidden" value="{{ next_path }}">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" autocomplete="username" required>
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
      <button type="submit">Sign in</button>
    </form>
  </main>
</body>
</html>
